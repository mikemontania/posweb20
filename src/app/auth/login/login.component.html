<div class="login-bg">
  <div class="login-card">

    <!-- Logo completo MBusiness POS -->
    <div class="login-logo">
      <img
        src="assets/images/icon-192x192.png"
        alt="MBusiness POS"
        class="login-logo-icon"
      />
      <img
        src="assets/images/logo-mb-ps2.png"
        alt="MBusiness POS"
        class="login-logo-text-img"
      />
    </div>

    <p class="login-subtitle">Sistema de punto de venta</p>

    <div class="login-form">

      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input
            id="username"
            type="email"
            class="form-control input-with-icon"
            placeholder="correo@empresa.com"
            [value]="username()"
            (input)="username.set($any($event.target).value)"
            (keyup.enter)="onSubmit()"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            id="password"
            [type]="showPass() ? 'text' : 'password'"
            class="form-control input-with-icon input-with-action"
            placeholder="••••••••••"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            (keyup.enter)="onSubmit()"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="input-action"
            (click)="toggleShowPass()"
            [attr.aria-label]="showPass() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            @if (showPass()) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <label class="remember-label">
        <input
          type="checkbox"
          class="remember-check"
          [checked]="remember()"
          (change)="remember.set($any($event.target).checked)"
        />
        <span class="remember-box"></span>
        Recuérdame
      </label>

      <button
        class="btn btn-primary btn-login"
        (click)="onSubmit()"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="spinner" style="width:18px;height:18px;border-width:2px"></span>
          Ingresando...
        } @else {
          Ingresar
        }
      </button>
    </div>

  </div>
</div>
