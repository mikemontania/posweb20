<div class="page-content page-form">
  @if (loading()) { <div class="form-loading"><span class="spinner"></span> Cargando...</div> }
  @if (!loading()) {
    <div class="card form-card">
      <div class="card-header form-card-header">
        <h2 class="form-title">{{ esEdicion() ? 'Actualizar Vendedor' : 'Nuevo Vendedor' }}</h2>
        <a routerLink="/vendedores" class="btn btn-secondary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg> Volver
        </a>
      </div>
      <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="guardar()">

          <div class="form-section-title">Datos del Vendedor</div>
          <div class="form-grid-2">
            <div class="form-group form-row">
              <label class="form-label">Código ERP </label>
              <input type="text" class="form-control" formControlName="codVendedorErp"  (blur)="toUpper('codVendedorErp')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Nombre Vendedor <span class="req">*</span></label>
              <input type="text" class="form-control" formControlName="vendedor" [class.is-invalid]="hasError('vendedor')" (blur)="toUpper('vendedor')"/>
              @if (hasError('vendedor','required')) { <div class="field-error">Nombre Vendedor es requerido/a</div> }
            </div>
            <div class="form-group form-row">
              <label class="form-label">Nro. Documento <span class="req">*</span></label>
              <input type="text" class="form-control" formControlName="docNro" [class.is-invalid]="hasError('docNro')" (blur)="toUpper('docNro')"/>
              @if (hasError('docNro','required')) { <div class="field-error">Nro. Documento es requerido/a</div> }
            </div>
            <div class="form-group form-row">
              <label class="form-label">Teléfono </label>
              <input type="text" class="form-control" formControlName="telefono"  (blur)="toUpper('telefono')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Email </label>
              <input type="email" class="form-control" formControlName="email"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Dirección </label>
              <input type="text" class="form-control" formControlName="direccion"  (blur)="toUpper('direccion')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">% Comisión </label>
              <input type="number" class="form-control" formControlName="porcentajeComision"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Observaciones </label>
              <input type="text" class="form-control" formControlName="obs"  (blur)="toUpper('obs')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Usuario vinculado</label>
              <app-select-search [items]="usuarios()" bindLabel="nombrePersona"
                bindValue="codUsuario" placeholder="Seleccione usuario"
                [selected]="selUsuario()" (changed)="selUsuario.set($any($event))"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Activo</label>
              <select class="form-control" formControlName="activo">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>

          <div class="form-actions">
            <a routerLink="/vendedores" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
              </svg> Atrás
            </a>
            <button type="submit" class="btn btn-primary" [disabled]="guardando()">
              @if (guardando()) { <span class="spinner" style="width:16px;height:16px;border-width:2px"></span> }
              {{ esEdicion() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
