<div class="page-content page-form">
  @if (loading()) { <div class="form-loading"><span class="spinner"></span> Cargando...</div> }
  @if (!loading()) {
    <div class="card form-card">
      <div class="card-header form-card-header">
        <h2 class="form-title">{{ esEdicion() ? 'Actualizar Chofer' : 'Nuevo Chofer' }}</h2>
        <a routerLink="/choferes" class="btn btn-secondary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg> Volver
        </a>
      </div>
      <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="guardar()">

          <div class="form-section-title">Datos del Chofer</div>
          <div class="form-grid-2">
            <div class="form-group form-row">
              <label class="form-label">Código ERP </label>
              <input type="text" class="form-control" formControlName="codChoferErp"  (blur)="toUpper('codChoferErp')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Nombre Chofer <span class="req">*</span></label>
              <input type="text" class="form-control" formControlName="chofer" [class.is-invalid]="hasError('chofer')" (blur)="toUpper('chofer')"/>
              @if (hasError('chofer','required')) { <div class="field-error">Nombre Chofer es requerido/a</div> }
            </div>
            <div class="form-group form-row">
              <label class="form-label">Nro. Documento <span class="req">*</span></label>
              <input type="text" class="form-control" formControlName="docNro" [class.is-invalid]="hasError('docNro')" (blur)="toUpper('docNro')"/>
              @if (hasError('docNro','required')) { <div class="field-error">Nro. Documento es requerido/a</div> }
            </div>
            <div class="form-group form-row">
              <label class="form-label">Nro. Licencia </label>
              <input type="text" class="form-control" formControlName="licencia"  (blur)="toUpper('licencia')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Tipo Licencia</label>
              <select class="form-control" formControlName="tipoLicencia">
                <option [ngValue]="'PARTICULAR'">PARTICULAR</option>
                <option [ngValue]="'PROFESIONAL'">PROFESIONAL</option>
                <option [ngValue]="'INTERNACIONAL'">INTERNACIONAL</option>
              </select>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Activo</label>
              <select class="form-control" formControlName="activo">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>

          <div class="form-actions">
            <a routerLink="/choferes" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
              </svg> Atrás
            </a>
            <button type="submit" class="btn btn-primary" [disabled]="guardando()">
              @if (guardando()) { <span class="spinner" style="width:16px;height:16px;border-width:2px"></span> }
              {{ esEdicion() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
