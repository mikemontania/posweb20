<div class="page-content page-form">
  @if (loading()) { <div class="form-loading"><span class="spinner"></span> Cargando...</div> }
  @if (!loading()) {
    <div class="card form-card">
      <div class="card-header form-card-header">
        <h2 class="form-title">{{ esEdicion() ? 'Actualizar Precio de Costo' : 'Nuevo Precio de Costo' }}</h2>
        <a routerLink="/precios-materiales" class="btn btn-secondary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg> Volver
        </a>
      </div>
      <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="guardar()">

          <div class="form-section-title">Vínculos</div>
          <div class="form-grid-2">
            <div class="form-group form-row">
              <label class="form-label">Producto *</label>
              <app-select-search [items]="productos()" bindLabel="concatCodErpNombre" bindValue="codProducto"
                placeholder="Seleccione producto" [selected]="selProducto()" (changed)="selProducto.set($any($event))"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Sucursal *</label>
              <app-select-search [items]="sucursales()" bindLabel="nombreSucursal" bindValue="codSucursal"
                placeholder="Seleccione sucursal" [selected]="selSucursal()" (changed)="selSucursal.set($any($event))"/>
            </div>
          </div>

          <div class="form-section-title">Precio</div>
          <div class="form-grid-2">
            <div class="form-group form-row">
              <label class="form-label">Precio Costo (Gs.) <span class="req">*</span></label>
              <input type="number" class="form-control" formControlName="precioCosto" [class.is-invalid]="hasError('precioCosto')" />
              @if (hasError('precioCosto','required')) { <div class="field-error">Precio Costo (Gs.) requerido/a</div> }
            </div>
          </div>

          <div class="form-actions">
            <a routerLink="/precios-materiales" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
              </svg> Atrás
            </a>
            <button type="submit" class="btn btn-primary" [disabled]="guardando()">
              @if (guardando()) { <span class="spinner" style="width:16px;height:16px;border-width:2px"></span> }
              {{ esEdicion() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
