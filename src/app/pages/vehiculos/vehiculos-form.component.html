<div class="page-content page-form">
  @if (loading()) { <div class="form-loading"><span class="spinner"></span> Cargando...</div> }
  @if (!loading()) {
    <div class="card form-card">
      <div class="card-header form-card-header">
        <h2 class="form-title">{{ esEdicion() ? 'Actualizar Vehículo' : 'Nuevo Vehículo' }}</h2>
        <a routerLink="/vehiculos" class="btn btn-secondary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg> Volver
        </a>
      </div>
      <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="guardar()">

          <div class="form-section-title">Datos del Vehículo</div>
          <div class="form-grid-2">
            <div class="form-group form-row">
              <label class="form-label">Código ERP </label>
              <input type="text" class="form-control" formControlName="codVehiculoErp"  (blur)="toUpper('codVehiculoErp')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Nro. Chasis </label>
              <input type="text" class="form-control" formControlName="nroChasis"  (blur)="toUpper('nroChasis')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Nro. Chapa <span class="req">*</span></label>
              <input type="text" class="form-control" formControlName="nroChapa" [class.is-invalid]="hasError('nroChapa')" (blur)="toUpper('nroChapa')"/>
              @if (hasError('nroChapa','required')) { <div class="field-error">Nro. Chapa es requerido/a</div> }
            </div>
            <div class="form-group form-row">
              <label class="form-label">Marca </label>
              <input type="text" class="form-control" formControlName="marca"  (blur)="toUpper('marca')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Modelo <span class="req">*</span></label>
              <input type="text" class="form-control" formControlName="modelo" [class.is-invalid]="hasError('modelo')" (blur)="toUpper('modelo')"/>
              @if (hasError('modelo','required')) { <div class="field-error">Modelo es requerido/a</div> }
            </div>
            <div class="form-group form-row">
              <label class="form-label">Color </label>
              <input type="text" class="form-control" formControlName="color"  (blur)="toUpper('color')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Combustible</label>
              <select class="form-control" formControlName="combustible">
                <option [ngValue]="'GASOLINA'">GASOLINA</option>
                <option [ngValue]="'DIESEL'">DIESEL</option>
                <option [ngValue]="'GLP'">GLP</option>
                <option [ngValue]="'ELECTRICO'">ELÉCTRICO</option>
              </select>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Transmisión</label>
              <select class="form-control" formControlName="transmision">
                <option [ngValue]="'MECANICO'">MECÁNICO</option>
                <option [ngValue]="'AUTOMATICO'">AUTOMÁTICO</option>
              </select>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Activo</label>
              <select class="form-control" formControlName="activo">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>

          <div class="form-actions">
            <a routerLink="/vehiculos" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
              </svg> Atrás
            </a>
            <button type="submit" class="btn btn-primary" [disabled]="guardando()">
              @if (guardando()) { <span class="spinner" style="width:16px;height:16px;border-width:2px"></span> }
              {{ esEdicion() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
