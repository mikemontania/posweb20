<div class="page-content page-form">
  @if (loading()) { <div class="form-loading"><span class="spinner"></span> Cargando...</div> }
  @if (!loading()) {
    <div class="card form-card">
      <div class="card-header form-card-header"><h2 class="form-title">{{ esEdicion() ? 'Actualizar Alianza' : 'Nueva Alianza' }}</h2></div>
      <div class="card-body">
        <form #f="ngForm" (ngSubmit)="guardar()">
          <div class="form-fields form-grid-2">
            <div class="form-group form-row col-span-2"><label class="form-label">Nombre Alianza <span class="req">*</span></label>
              <input type="text" class="form-control" name="alianza" required
                [ngModel]="item().alianza" (ngModelChange)="set('alianza', toUpper($event))"></div>
            <div class="form-group form-row"><label class="form-label">Descuento %</label>
              <input type="number" class="form-control" name="descuento"
                [ngModel]="item().descuento" (ngModelChange)="set('descuento', +$event)"></div>
            <div class="form-group form-row"><label class="form-label">Registros máx.</label>
              <input type="number" class="form-control" name="registros"
                [ngModel]="item().registros" (ngModelChange)="set('registros', +$event)"></div>
            <div class="form-group form-row"><label class="form-label">Válido desde</label>
              <input type="date" class="form-control" name="fechaDesde"
                [ngModel]="item().fechaDesde" (ngModelChange)="set('fechaDesde', $event)"></div>
            <div class="form-group form-row"><label class="form-label">Vencimiento</label>
              <input type="date" class="form-control" name="fechaHasta"
                [ngModel]="item().fechaHasta" (ngModelChange)="set('fechaHasta', $event)"></div>
          </div>
          <div class="form-actions">
            <a routerLink="/alianzas" class="btn btn-secondary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Atrás</a>
            <button type="submit" class="btn btn-primary" [disabled]="guardando() || f.invalid">
              @if (guardando()) { <span class="spinner" style="width:16px;height:16px;border-width:2px"></span> }
              {{ esEdicion() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
