<div class="page-content page-form">
  @if (loading()) { <div class="form-loading"><span class="spinner"></span> Cargando...</div> }
  @if (!loading()) {
    <div class="card form-card">
      <div class="card-header form-card-header">
        <h2 class="form-title">{{ esEdicion() ? 'Actualizar Punto' : 'Nuevo Punto' }}</h2>
        <a routerLink="/puntos" class="btn btn-secondary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg> Volver
        </a>
      </div>
      <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="guardar()">
          <div class="form-section-title">Datos del Punto</div>
          <div class="form-grid-2">
            <div class="form-group form-row">
              <label class="form-label">Descripción <span class="req">*</span></label>
              <input type="text" class="form-control" formControlName="descripcion" [class.is-invalid]="hasError('descripcion')" (blur)="toUpper('descripcion')"/>
              @if (hasError('descripcion','required')) { <div class="field-error">Descripción requerido/a</div> }
            </div>
            <div class="form-group form-row">
              <label class="form-label">Tipo</label>
              <select class="form-control" formControlName="tipo">
                <option [ngValue]="'FIJO'">FIJO</option>
                <option [ngValue]="'PORCENTAJE'">PORCENTAJE</option>
                <option [ngValue]="'MIXTO'">MIXTO</option>
              </select>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Puntos <span class="req">*</span></label>
              <input type="number" class="form-control" formControlName="puntos" [class.is-invalid]="hasError('puntos')" />
              @if (hasError('puntos','required')) { <div class="field-error">Puntos requerido/a</div> }
            </div>
            <div class="form-group form-row">
              <label class="form-label">Importe Desde </label>
              <input type="number" class="form-control" formControlName="importeDesde"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Importe Hasta </label>
              <input type="number" class="form-control" formControlName="importeHasta"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Fecha Desde </label>
              <input type="date" class="form-control" formControlName="fechaDesde"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Fecha Hasta </label>
              <input type="date" class="form-control" formControlName="fechaHasta"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Activo</label>
              <select class="form-control" formControlName="activo">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>

          <div class="form-section-title">Vínculos</div>
          <div class="form-grid-2">
            <div class="form-group form-row">
              <label class="form-label">Lista de Precio</label>
              <app-select-search [items]="listasPrecios()" bindLabel="descripcion"
                bindValue="codListaPrecio" placeholder="Seleccione lista (opcional)"
                [selected]="selListaPrecio()" (changed)="selListaPrecio.set($any($event))"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Producto</label>
              <app-select-search [items]="productos()" bindLabel="concatCodErpNombre"
                bindValue="codProducto" placeholder="Seleccione producto (opcional)"
                [selected]="selProducto()" (changed)="selProducto.set($any($event))"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Sucursal</label>
              <app-select-search [items]="sucursales()" bindLabel="nombreSucursal"
                bindValue="codSucursal" placeholder="Seleccione sucursal (opcional)"
                [selected]="selSucursal()" (changed)="selSucursal.set($any($event))"/>
            </div>
          </div>

          <div class="form-actions">
            <a routerLink="/puntos" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
              </svg> Atrás
            </a>
            <button type="submit" class="btn btn-primary" [disabled]="guardando()">
              @if (guardando()) { <span class="spinner" style="width:16px;height:16px;border-width:2px"></span> }
              {{ esEdicion() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
