<div class="page-content page-form">
  @if (loading()) {
    <div class="form-loading"><span class="spinner"></span> Cargando...</div>
  }
  @if (!loading()) {
    <div class="card form-card">
      <div class="card-header form-card-header">
        <h2 class="form-title">{{ esEdicion() ? 'Actualizar' : 'Nuevo' }} Motivo Anulación Compra</h2>
      </div>
      <div class="card-body">
        <form #f="ngForm" (ngSubmit)="guardar()">
          <div class="form-fields form-grid-2">

        <div class="form-row">
          <label class="form-label">Código ERP<span class="req">*</span></label>
          <input type="text" class="form-control" name="codMotivoAnulacionCompraErp" required
            [ngModel]="it.codMotivoAnulacionCompraErp"
            (ngModelChange)="set('codMotivoAnulacionCompraErp', toUpper($event))"/>
        </div>
        <div class="form-row">
          <label class="form-label">Descripción<span class="req">*</span></label>
          <input type="text" class="form-control" name="descripcion" required
            [ngModel]="it.descripcion"
            (ngModelChange)="set('descripcion', toUpper($event))"/>
        </div>
          </div>
          <div class="form-actions">
            <a routerLink="/motivo-anulacion-compra" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
              </svg>
              Atrás
            </a>
            <button type="submit" class="btn btn-primary" [disabled]="guardando() || f.invalid">
              @if (guardando()) {
                <span class="spinner" style="width:16px;height:16px;border-width:2px"></span>
              }
              {{ esEdicion() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
