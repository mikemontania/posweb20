<div class="page-content page-form">
  @if (loading()) {
    <div class="form-loading"><span class="spinner"></span> Cargando...</div>
  }
  @if (!loading()) {
    <div class="card form-card">
      <div class="card-header form-card-header">
        <h2 class="form-title">{{ esEdicion() ? 'Actualizar' : 'Nueva' }} Terminal</h2>
      </div>
      <div class="card-body">
        <form #f="ngForm" (ngSubmit)="guardar()">
          <div class="form-fields form-grid-2">
            <div class="form-row">
              <label class="form-label">Terminal <span class="req">*</span></label>
              <input type="text" class="form-control" name="descripcion" required
                [ngModel]="it.descripcion"
                (ngModelChange)="set('descripcion', toUpper($event))"/>
            </div>
            <div class="form-row">
              <label class="form-label">Sucursal <span class="req">*</span></label>
              <select class="form-control" name="codSucursal" required
                [ngModel]="it.codSucursal"
                (ngModelChange)="set('codSucursal', +$event)">
                <option value="">— Seleccione —</option>
                @for (s of sucursales(); track s.codSucursal) {
                  <option [value]="s.codSucursal">{{ s.nombreSucursal }}</option>
                }
              </select>
            </div>
            <div class="form-row">
              <label class="form-label">Disponible</label>
              <select class="form-control" name="disponible"
                [ngModel]="it.disponible"
                (ngModelChange)="set('disponible', $event === 'true' || $event === true)">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <a routerLink="/terminales" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
              </svg>
              Atrás
            </a>
            <button type="submit" class="btn btn-primary" [disabled]="guardando() || f.invalid">
              @if (guardando()) {
                <span class="spinner" style="width:16px;height:16px;border-width:2px"></span>
              }
              {{ esEdicion() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
