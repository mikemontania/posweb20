<!-- ── Layout obsequios ────────────────────────────────────── -->
<div class="pos-layout">

  <!-- ════════ IZQUIERDA — Carrito ════════ -->
  <aside class="pos-left" [class.tab-hidden]="tabActivo !== 'carrito'">

    <!-- Cabecera -->
    <div class="pos-header">
      <div class="pos-header-left">
        <span class="pos-icon">🎁</span>
        <span class="pos-title">Obsequio</span>
      </div>
    </div>

    <!-- Cliente propietario — fijo, sin buscador -->
    <div class="obs-cliente">
      <svg class="obs-cliente-icon" width="15" height="15" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <div class="obs-cliente-info">
        <span class="obs-cliente-label">Cliente propietario</span>
        <span class="obs-cliente-nombre">{{ st.razonSocial() || '—' }}</span>
      </div>
      @if (st.cliente()?.listaPrecio) {
        <span class="obs-lista-badge">{{ st.cliente()!.listaPrecio.descripcion }}</span>
      }
    </div>

    <!-- Carrito -->
    <div class="pos-detalle-container">
      <app-pos-detalle
        [ventaDetalles]="st.ventaDetalles()"
        [descuentos]="[]"
        [disabled]="!st.buscadorHabilitado()"
        (restar)="onRestar($event)"
        (quitar)="onQuitar($event)"
        (agregarUno)="onAgregar($event)"
        (quitarDescuento)="$event"/>
    </div>

    <!-- Totales -->
    <app-pos-totales [venta]="st.venta()"/>

    <!-- Nota precio costo -->
    <div class="obs-nota">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Precios calculados al costo. Sin descuentos.
    </div>

    <!-- Acciones -->
    <div class="pos-footer">
      <button class="btn-cancelar" (click)="onCancelar()">Cancelar</button>
      <button class="btn-guardar"
              (click)="onGuardar()"
              [disabled]="st.guardando() || st.carritoVacio() || !st.venta()">
        @if (st.guardando()) { <span class="spinner-sm"></span> }
        Guardar obsequio
      </button>
    </div>

  </aside>

  <!-- ════════ DERECHA — Catálogo ════════ -->
  <section class="pos-right" [class.tab-hidden]="tabActivo !== 'catalogo'">
    <app-pos-catalogo
      [productos]="st.productos()"
      [categorias]="st.categorias()"
      [loading]="st.cargandoProds()"
      [totalElementos]="st.totalElementos()"
      [pagina]="st.pagina()"
      [cantidadElementos]="st.cantidadElementos()"
      [disabled]="!st.buscadorHabilitado()"
      (productoClick)="onProductoClick($event)"
      (pageChange)="onPageChange($event)"
      (busquedaChange)="onBusquedaChange($event)"
      (categoriaChange)="onCategoriaChange($event)"/>
  </section>

  <!-- ════════ TAB BAR MÓVIL ════════ -->
  <nav class="pos-tabs">
    <button class="pos-tab-btn" [class.active]="tabActivo === 'catalogo'"
            (click)="tabActivo = 'catalogo'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Productos
    </button>
    <button class="pos-tab-btn" [class.active]="tabActivo === 'carrito'"
            (click)="tabActivo = 'carrito'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      Carrito
      @if (st.ventaDetalles().length > 0) {
        <span class="pos-tab-badge">{{ st.ventaDetalles().length }}</span>
      }
    </button>
  </nav>

</div>

<!-- ════════ MODAL TERMINAL ════════ -->
@if (!st.autorizado()) {
  <div class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Seleccionar terminal</h3>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Terminal</label>
          <select class="form-control" [(ngModel)]="terminalSel" name="t">
            @for (t of st.terminales(); track t.codTerminalVenta) {
              <option [value]="t.codTerminalVenta">{{ t.descripcion }}</option>
            }
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary"
                (click)="facade.guardarTerminal(terminalSel)">
          Confirmar
        </button>
      </div>
    </div>
  </div>
}
