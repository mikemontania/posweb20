<div class="page-content page-form">
  @if (loading()) { <div class="form-loading"><span class="spinner"></span> Cargando...</div> }
  @if (!loading()) {
    <div class="card form-card">
      <div class="card-header form-card-header">
        <h2 class="form-title">{{ esEdicion() ? 'Actualizar Precio' : 'Nuevo Precio' }}</h2>
        <a routerLink="/precios" class="btn btn-secondary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg> Volver
        </a>
      </div>
      <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="guardar()">

          <div class="form-section-title">Vínculos</div>
          <div class="form-grid-2">
            <div class="form-group form-row">
              <label class="form-label">Lista de Precio *</label>
              <app-select-search [items]="listasPrecios()" bindLabel="descripcion" bindValue="codListaPrecio"
                placeholder="Seleccione lista" [selected]="selListaPrecio()" (changed)="selListaPrecio.set($any($event))"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Producto *</label>
              <app-select-search [items]="productos()" bindLabel="concatCodErpNombre" bindValue="codProducto"
                placeholder="Seleccione producto" [selected]="selProducto()" (changed)="selProducto.set($any($event))"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Tipo Precio</label>
              <app-select-search [items]="tiposPrecios()" bindLabel="descripcion" bindValue="codTipoPrecio"
                placeholder="Seleccione tipo" [selected]="selTipoPrecio()" (changed)="selTipoPrecio.set($any($event))"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Unidad Medida</label>
              <app-select-search [items]="unidades()" bindLabel="nombreUnidad" bindValue="codUnidad"
                placeholder="Seleccione unidad" [selected]="selUnidad()" (changed)="selUnidad.set($any($event))"/>
            </div>
          </div>

          <div class="form-section-title">Datos del Precio</div>
          <div class="form-grid-2">
            <div class="form-group form-row">
              <label class="form-label">Código ERP </label>
              <input type="text" class="form-control" formControlName="codPrecioErp"  (blur)="toUpper('codPrecioErp')"/>
            </div>
            <div class="form-group form-row">
              <label class="form-label">Precio (Gs.) <span class="req">*</span></label>
              <input type="number" class="form-control" formControlName="precio" [class.is-invalid]="hasError('precio')" />
              @if (hasError('precio','required')) { <div class="field-error">Precio (Gs.) requerido/a</div> }
            </div>
            <div class="form-group form-row">
              <label class="form-label">Cant. Desde </label>
              <input type="number" class="form-control" formControlName="cantDesde"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Cant. Hasta </label>
              <input type="number" class="form-control" formControlName="cantHasta"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Fecha Desde </label>
              <input type="date" class="form-control" formControlName="fechaDesde"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Fecha Hasta </label>
              <input type="date" class="form-control" formControlName="fechaHasta"  />
            </div>
            <div class="form-group form-row">
              <label class="form-label">Activo</label>
              <select class="form-control" formControlName="activo">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>

          <div class="form-actions">
            <a routerLink="/precios" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
              </svg> Atrás
            </a>
            <button type="submit" class="btn btn-primary" [disabled]="guardando()">
              @if (guardando()) { <span class="spinner" style="width:16px;height:16px;border-width:2px"></span> }
              {{ esEdicion() ? 'Actualizar' : 'Crear' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
