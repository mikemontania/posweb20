<div class="card ">
    <div class="card-header label-themecolor">
        <h4 *ngIf="!categoria.codCategoriaProducto" class="m-b-0 text-white">Crear categoria</h4>
        <h4 *ngIf="categoria.codCategoriaProducto" class="m-b-0 text-white">Actualizar categoria</h4>
    </div>
    <div class="card-body">

        <form #categoriaForm="ngForm">

            <div class="form-group row">
                <label for="codCategoriaProductoErp" class="col-form-label col-sm-2">Codigo Erp <span style="color: red">(*)</span></label>
                <div class="col-sm-6">
                    <input type="text" class="form-control" [(ngModel)]="categoria.codCategoriaProductoErp" (ngModelChange)="categoria.codCategoriaProductoErp = toUpeCaseEvent($event)" name="codCategoriaProductoErp" #codCategoriaProductoErp="ngModel" required minlength="1">
                    <div class="alert alert-danger" *ngIf="codCategoriaProductoErp.invalid && (codCategoriaProductoErp.dirty || codCategoriaProductoErp.touched)">
                        <div *ngIf="!!codCategoriaProductoErp.errors.required">
                            codCategoriaProductoErp es requerido
                        </div>
                        <div *ngIf="!!codCategoriaProductoErp.errors.minlength">
                            codCategoriaProductoErp debe tener al menos 1 caracteres
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-group row">
                <label for="descripcion" class="col-form-label col-sm-2">Categoria <span style="color: red">(*)</span></label>
                <div class="col-sm-6">
                    <input type="text" class="form-control" [(ngModel)]="categoria.descripcion" (ngModelChange)="categoria.descripcion = toUpeCaseEvent($event)" name="descripcion" #descripcion="ngModel" required minlength="5">
                    <div class="alert alert-danger" *ngIf="descripcion.invalid && (descripcion.dirty || descripcion.touched)">
                        <div *ngIf="!!descripcion.errors.required">
                            descripcion es requerido
                        </div>
                        <div *ngIf="!!descripcion.errors.minlength">
                            descripcion debe tener al menos 5 caracteres
                        </div>
                    </div>
                </div>
            </div>


            <div class="form-group row button-group">
                <div class="col-sm-6">
                    <button type="button" [routerLink]="['/categoria']" class="btn btn-danger waves-effect waves-light"><i class="fa  fa-arrow-circle-left"></i> Atrás</button>
                    <button class="btn btn-info waves-effect waves-light" type="button" role="button" (click)='create()' *ngIf="!categoria.codCategoriaProducto else elseBlock" [disabled]="!categoriaForm.form.valid"><i class="fa   fa-floppy-o"></i>Crear</button>
                    <ng-template #elseBlock>
                        <button class="btn btn-info waves-effect waves-light" type="button" role="button" (click)='update()' [disabled]="!categoriaForm.form.valid"><i class="fa   fa-floppy-o"></i>Actualizar</button>
                    </ng-template>
                </div>
            </div>

        </form>

    </div>
</div>
