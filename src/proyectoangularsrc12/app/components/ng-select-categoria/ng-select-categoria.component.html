<ng-select [items]="categorias" notFoundText="No se ha encontrado categorias" placeholder="Seleccione categoria" [(ngModel)]="cargadorCategoria" bindLabel="descripcion" (change)="selectedItem($event)">
    <ng-template ng-option-tmp let-item="item" let-index="index" let-search="searchTerm">
        <b [ngOptionHighlight]="search">{{item.descripcion}}</b>
    </ng-template>
</ng-select>
