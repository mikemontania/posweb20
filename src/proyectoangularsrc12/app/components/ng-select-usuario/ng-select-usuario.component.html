<ng-select [items]="usuarios" (search)="onSearch($event)" placeholder="Seleccione usuario" (change)="selectedItem($event)" notFoundText="No se ha encontrado usuario" bindLabel="nombrePersona" [(ngModel)]="cargadorUsuario">
    <!--    <ng-template ng-option-tmp let-item="item">
        {{item.nombrePersona}} <br/>
        <small>{{item.username}}</small>
    </ng-template> -->
    <ng-template ng-option-tmp let-item="item" let-index="index" let-search="searchTerm">
        <b [ngOptionHighlight]="search">{{item.username}}</b>

    </ng-template>
</ng-select>
