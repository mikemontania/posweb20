<ng-select [items]="mediosDePago" notFoundText="No se ha encontrado medios de pago" placeholder="Seleccione medio de pago" [(ngModel)]="cargadorMedioPago" bindLabel="descripcion" (change)="selectedItem($event)">
    <ng-template ng-option-tmp let-item="item" let-index="index" let-search="searchTerm">
        <b [ngOptionHighlight]="search">{{item.descripcion}}</b>
    </ng-template>
</ng-select>
