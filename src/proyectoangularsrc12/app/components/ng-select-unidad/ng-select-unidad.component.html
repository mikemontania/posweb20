<ng-select [items]="unidades" notFoundText="No se ha encontrado unidad" placeholder="Seleccione unidad" [(ngModel)]="cargadorUnidad" bindLabel="nombreUnidad" (change)="selectedItem($event)">
    <ng-template ng-option-tmp let-item="item" let-index="index" let-search="searchTerm">
        <b [ngOptionHighlight]="search">{{item.nombreUnidad}}</b>
    </ng-template>
</ng-select>
